# Redirection automatique de tout le trafic HTTP vers HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    return 301 https://$host$request_uri;
}

# Serveur principal en HTTPS
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    server_name _;

    root /var/www/html;
    index index.html index.htm;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Recommandé : versions modernes de TLS uniquement
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        # Important pour une SPA React (React Router) :
        # renvoie index.html si le fichier demandé n'existe pas,
        # pour laisser React gérer les routes côté client.
        try_files $uri /index.html;
    }
}